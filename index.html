<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Odd Shoes — Odd Agent</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 0; background:#0b0f1a; color:#fff; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 22px; }
    .card { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius: 18px; overflow: hidden; }
    .head { display:flex; justify-content:space-between; align-items:center; padding: 16px 18px; background: rgba(255,255,255,0.05); }
    .brand { font-weight: 850; letter-spacing: .2px; }
    .sub { opacity:.85; font-size: 13px; margin-top: 4px; }
    .cta a { display:inline-block; padding:10px 12px; border-radius: 12px; background:#fff; color:#000; text-decoration:none; font-weight:800; }
    #chat { height: 440px; overflow-y:auto; padding: 18px; }
    .row { display:flex; margin: 10px 0; }
    .row.user { justify-content:flex-end; }
    .bubble { max-width: 76%; padding: 12px 14px; border-radius: 14px; line-height: 1.35; white-space: pre-wrap; }
    .user .bubble { background:#fff; color:#000; border-bottom-right-radius: 4px; }
    .agent .bubble { background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); border-bottom-left-radius: 4px; }
    .foot { display:flex; gap:10px; padding: 14px; border-top: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); }
    input { flex:1; padding: 12px; border-radius: 12px; border:1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.22); color:#fff; outline:none; }
    button { padding: 12px 14px; border-radius: 12px; border:0; background:#7c3aed; color:#fff; font-weight:800; cursor:pointer; }
    .tiny { font-size:12px; opacity:.8; padding: 0 18px 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div>
          <div class="brand">👟 Odd Shoes — Odd Agent</div>
          <div class="sub">Ask about styles, comfort & sizing. Want discounts? Drop your email.</div>
        </div>
        <div class="cta">
          <a href="https://oddshoes.dev" target="_blank" rel="noreferrer">Shop Now</a>
        </div>
      </div>

      <div id="chat"></div>

      <div class="foot">
        <input id="input" placeholder="Try: 'I need a bold pair for a party'" />
        <button id="send">Send</button>
      </div>
      <div class="tiny">Tip: Say “discount” → the agent should ask for your email.</div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    // Light memory: last messages sent to backend
    const history = [];

    function add(role, text) {
      const row = document.createElement("div");
      row.className = "row " + (role === "user" ? "user" : "agent");

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    add("agent", "Yo! I’m Odd Agent 👟😈\nTell me your vibe: casual, sporty, or bold-statement?");

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;

      add("user", msg);
      history.push({ role: "user", content: msg });
      input.value = "";

      add("agent", "…thinking");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg, history })
        });
        const data = await res.json();
        chat.lastChild.remove();

        const reply = data.reply || "Oops—something broke. Try again.";
        add("agent", reply);
        history.push({ role: "assistant", content: reply });
      } catch (e) {
        chat.lastChild.remove();
        add("agent", "Network error. Please try again.");
      }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
  </script>
</body>
</html>
